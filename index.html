<style>
/* ============================================================
   SISTEMA SOLAR VR — ESTILO CYBERPUNK/RETRÔ
   Cores: ciano #00f7ff · magenta #ff00ff · fundo #02020a
   ============================================================ */
:root{
  --ciano:#00f7ff;
  --magenta:#ff00ff;
  --fundo:#02020a;
  --painel:rgba(2,2,10,.78);
  --borda:rgba(0,247,255,.45);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--fundo);
  font-family:'Courier New',Courier,monospace;color:var(--ciano);
  touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block}

/* ---------- HUD ---------- */
#hud{position:fixed;inset:0;pointer-events:none;z-index:10;
  display:flex;flex-direction:column;justify-content:space-between}

#topo{display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:max(8px,env(safe-area-inset-top)) 10px 6px}
#titulo{font-size:clamp(11px,2.6vw,18px);letter-spacing:.35em;font-weight:bold;
  color:var(--ciano);text-shadow:0 0 8px var(--ciano),0 0 22px rgba(0,247,255,.6);
  white-space:nowrap}
#linhaStatus{display:flex;flex-wrap:wrap;justify-content:center;gap:6px}
.chip{background:var(--painel);border:1px solid var(--borda);border-radius:3px;
  padding:3px 8px;font-size:clamp(9px,2vw,12px);backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);text-shadow:0 0 6px rgba(0,247,255,.7);
  white-space:nowrap}
.chip b{color:var(--magenta);text-shadow:0 0 6px var(--magenta)}

#rodape{display:flex;flex-wrap:wrap;justify-content:center;align-items:flex-end;gap:8px;
  padding:6px 10px max(10px,env(safe-area-inset-bottom))}
#chipProximo{max-width:92vw;overflow:hidden;text-overflow:ellipsis}

/* ---------- BOTÕES ---------- */
button{pointer-events:auto;font-family:inherit;cursor:pointer;
  background:var(--painel);color:var(--ciano);border:1px solid var(--ciano);
  border-radius:3px;padding:8px 14px;font-size:clamp(10px,2.2vw,13px);
  letter-spacing:.12em;text-shadow:0 0 6px var(--ciano);
  box-shadow:0 0 10px rgba(0,247,255,.35),inset 0 0 10px rgba(0,247,255,.08);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  transition:box-shadow .2s,transform .1s}
button:active{transform:scale(.96);box-shadow:0 0 18px var(--ciano)}
button.magenta{color:var(--magenta);border-color:var(--magenta);
  text-shadow:0 0 6px var(--magenta);
  box-shadow:0 0 10px rgba(255,0,255,.35),inset 0 0 10px rgba(255,0,255,.08)}

/* ---------- PAINEL IPD ---------- */
#painelIPD{position:fixed;left:50%;bottom:70px;transform:translateX(-50%);
  z-index:30;background:var(--painel);border:1px solid var(--magenta);
  border-radius:4px;padding:12px 16px;display:none;flex-direction:column;
  gap:8px;align-items:center;pointer-events:auto;
  box-shadow:0 0 20px rgba(255,0,255,.4);backdrop-filter:blur(8px)}
#painelIPD.aberto{display:flex}
#painelIPD label{font-size:11px;letter-spacing:.15em;color:var(--magenta);
  text-shadow:0 0 6px var(--magenta)}
#sliderIPD{width:min(240px,60vw);accent-color:var(--magenta);pointer-events:auto}

/* ---------- MODAL FICHA TÉCNICA ---------- */
#modal{position:fixed;inset:0;z-index:40;display:none;align-items:center;
  justify-content:center;background:rgba(2,2,10,.55);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);pointer-events:auto}
#modal.aberto{display:flex;animation:surgir .25s ease-out}
@keyframes surgir{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
#ficha{width:min(420px,92vw);max-height:82vh;overflow-y:auto;
  background:var(--painel);border:1px solid var(--ciano);border-radius:5px;
  box-shadow:0 0 25px rgba(0,247,255,.5),0 0 60px rgba(255,0,255,.2);
  padding:18px 20px}
#ficha h2{font-size:clamp(18px,4.5vw,26px);letter-spacing:.2em;color:var(--magenta);
  text-shadow:0 0 10px var(--magenta),0 0 30px rgba(255,0,255,.6);
  border-bottom:1px solid var(--borda);padding-bottom:8px;margin-bottom:10px}
#ficha table{width:100%;border-collapse:collapse;font-size:clamp(11px,2.6vw,13px)}
#ficha td{padding:5px 4px;border-bottom:1px dashed rgba(0,247,255,.2);vertical-align:top}
#ficha td:first-child{color:rgba(0,247,255,.7);white-space:nowrap;padding-right:10px}
#ficha td:last-child{color:#e8fdff;text-shadow:0 0 4px rgba(0,247,255,.5)}
#curiosidade{margin-top:12px;padding:10px;border:1px dashed var(--magenta);
  border-radius:3px;font-size:clamp(11px,2.6vw,13px);color:#ffd8ff;
  text-shadow:0 0 5px rgba(255,0,255,.5);line-height:1.5}
#btnFechar{margin-top:14px;width:100%}

/* ---------- RETÍCULO (indicador de mira) ---------- */
#reticulo{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);
  width:26px;height:26px;border:2px solid rgba(0,247,255,.8);border-radius:50%;
  z-index:15;pointer-events:none;box-shadow:0 0 8px rgba(0,247,255,.7)}
#reticulo::after{content:'';position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);width:3px;height:3px;border-radius:50%;
  background:var(--magenta);box-shadow:0 0 6px var(--magenta)}

/* ---------- FLASH DE DISPARO ---------- */
#flash{position:fixed;inset:0;background:var(--ciano);opacity:0;
  pointer-events:none;z-index:50;transition:opacity .1s}

/* ---------- MODO VR ---------- */
#divisorVR{position:fixed;left:50%;top:0;width:2px;height:100%;
  background:linear-gradient(var(--ciano),var(--magenta),var(--ciano));
  z-index:20;display:none;box-shadow:0 0 10px var(--ciano)}
#btnSairVR{position:fixed;top:max(8px,env(safe-area-inset-top));left:50%;
  transform:translateX(-50%);z-index:60;display:none}
body.vr #divisorVR{display:block}
body.vr #btnSairVR{display:block}
body.vr #hud,body.vr #reticulo{display:none}

/* ---------- AVISOS ---------- */
#aviso{position:fixed;left:50%;top:14%;transform:translateX(-50%);z-index:70;
  background:var(--painel);border:1px solid var(--magenta);border-radius:4px;
  padding:10px 16px;font-size:clamp(10px,2.4vw,13px);color:var(--magenta);
  text-shadow:0 0 6px var(--magenta);display:none;max-width:88vw;text-align:center;
  box-shadow:0 0 16px rgba(255,0,255,.4)}

/* ---------- ORIENTAÇÃO ---------- */
#girarTela{position:fixed;inset:0;z-index:90;background:var(--fundo);display:none;
  flex-direction:column;align-items:center;justify-content:center;gap:14px;
  text-align:center;padding:20px}
#girarTela .icone{font-size:52px;animation:girar90 1.6s ease-in-out infinite}
@keyframes girar90{0%,20%{transform:rotate(0)}60%,100%{transform:rotate(-90deg)}}
body.vr.retrato #girarTela{display:flex}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:var(--borda);border-radius:3px}

/* ============================================================
   2. TEXTURAS PROCEDURAIS (Canvas API — sem imagens externas)
   ============================================================ */
function novaTextura(px, desenhar){
  const c = document.createElement('canvas');
  c.width = px; c.height = px;
  desenhar(c.getContext('2d'), px);
  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
// Ruído simples determinístico
function pseudoAleatorio(semente){
  let s = semente;
  return () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
}

// Planeta rochoso: manchas + crateras
function texturaRochosa(corBase, semente){
  return novaTextura(256, (ctx, px) => {
    const rnd = pseudoAleatorio(semente);
    ctx.fillStyle = corBase; ctx.fillRect(0, 0, px, px);
    for (let i = 0; i < 420; i++){
      const r = 2 + rnd() * 14;
      ctx.fillStyle = `rgba(${rnd()>.5?255:0},${rnd()>.5?255:0},${rnd()>.5?255:0},${0.04+rnd()*0.07})`;
      ctx.beginPath(); ctx.arc(rnd()*px, rnd()*px, r, 0, 7); ctx.fill();
    }
    for (let i = 0; i < 40; i++){ // crateras
      const x = rnd()*px, y = rnd()*px, r = 2 + rnd()*6;
      ctx.strokeStyle = 'rgba(0,0,0,.25)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,.08)';
      ctx.beginPath(); ctx.arc(x - r*.3, y - r*.3, r*.5, 0, 7); ctx.fill();
    }
  });
}
// Gigante gasoso: faixas horizontais (+ Grande Mancha para Júpiter)
function texturaGasosa(corBase, faixas, comMancha, semente){
  return novaTextura(256, (ctx, px) => {
    const rnd = pseudoAleatorio(semente);
    ctx.fillStyle = corBase; ctx.fillRect(0, 0, px, px);
    for (let y = 0; y < px; y += 3){
      const onda = Math.sin(y * 0.11) * 0.5 + Math.sin(y * 0.031) * 0.5;
      const alfa = 0.10 + Math.abs(onda) * 0.16;
      ctx.fillStyle = onda > 0 ? `rgba(255,255,255,${alfa})` : `rgba(60,30,10,${alfa})`;
      ctx.fillRect(0, y, px, 3);
    }
    for (const f of faixas){ // faixas de destaque
      ctx.fillStyle = f.cor;
      ctx.fillRect(0, f.y * px, px, f.h * px);
    }
    if (comMancha){ // Grande Mancha Vermelha
      const g = ctx.createRadialGradient(px*.68, px*.62, 2, px*.68, px*.62, px*.09);
      g.addColorStop(0, 'rgba(210,70,40,.95)');
      g.addColorStop(1, 'rgba(210,70,40,0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.ellipse(px*.68, px*.62, px*.10, px*.055, 0, 0, 7); ctx.fill();
    }
    for (let i = 0; i < 200; i++){ // turbulência sutil
      ctx.fillStyle = `rgba(255,255,255,${rnd()*0.05})`;
      ctx.fillRect(rnd()*px, rnd()*px, 1 + rnd()*10, 1);
    }
  });
}
// Terra: oceanos, continentes verdes, gelo polar e nuvens
function texturaTerra(){
  return novaTextura(256, (ctx, px) => {
    const rnd = pseudoAleatorio(1234);
    ctx.fillStyle = '#1a4fb0'; ctx.fillRect(0, 0, px, px); // oceano
    ctx.fillStyle = '#2d8a3e';
    for (let i = 0; i < 26; i++){ // continentes (blobs orgânicos)
      const x = rnd()*px, y = px*.15 + rnd()*px*.7;
      ctx.beginPath();
      for (let a = 0; a < 6.4; a += .5){
        const r = 8 + rnd()*22;
        ctx.lineTo(x + Math.cos(a)*r, y + Math.sin(a)*r*.7);
      }
      ctx.closePath(); ctx.fill();
    }
    ctx.fillStyle = '#eef6ff'; // gelo polar
    ctx.fillRect(0, 0, px, px*.08);
    ctx.fillRect(0, px*.92, px, px*.08);
    ctx.fillStyle = 'rgba(255,255,255,.5)'; // nuvens
    for (let i = 0; i < 34; i++){
      ctx.beginPath();
      ctx.ellipse(rnd()*px, rnd()*px, 6+rnd()*20, 2+rnd()*4, 0, 0, 7);
      ctx.fill();
    }
  });
}
// Sol: gradiente radial + granulação
function texturaSol(){
  return novaTextura(256, (ctx, px) => {
    const rnd = pseudoAleatorio(99);
    const g = ctx.createLinearGradient(0, 0, 0, px);
    g.addColorStop(0, '#ffdd66'); g.addColorStop(.5, '#ff9a1e'); g.addColorStop(1, '#ffdd66');
    ctx.fillStyle = g; ctx.fillRect(0, 0, px, px);
    for (let i = 0; i < 700; i++){
      ctx.fillStyle = rnd() > .5 ? 'rgba(255,255,200,.14)' : 'rgba(200,60,0,.12)';
      ctx.beginPath(); ctx.arc(rnd()*px, rnd()*px, 1 + rnd()*5, 0, 7); ctx.fill();
    }
  });
}
// Sprite radial (corona / brilho / retículo 3D)
function texturaRadial(corInterna, corExterna){
  return novaTextura(128, (ctx, px) => {
    const g = ctx.createRadialGradient(px/2, px/2, 0, px/2, px/2, px/2);
    g.addColorStop(0, corInterna); g.addColorStop(1, corExterna);
    ctx.fillStyle = g; ctx.fillRect(0, 0, px, px);
  });
}
// Rótulo de texto neon (sprite)
function spriteRotulo(texto){
  const c = document.createElement('canvas');
  c.width = 512; c.height = 128;
  const ctx = c.getContext('2d');
  ctx.font = 'bold 56px "Courier New", monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = '#00f7ff'; ctx.shadowBlur = 18;
  ctx.fillStyle = '#c8feff';
  ctx.fillText(texto.toUpperCase(), 256, 64);
  const t = new THREE.CanvasTexture(c);
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({
    map:t, transparent:true, depthWrite:false }));
  sp.scale.set(4.6, 1.15, 1);
  return sp;
}

/* ============================================================
   3. CENA, CÂMERA E RENDERIZADOR
   ============================================================ */
const cena = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1200);
const camL = camera.clone(), camR = camera.clone(); // câmeras estéreo

const renderer = new THREE.WebGLRenderer({ antialias:true, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2)); // limite p/ celulares
renderer.shadowMap.enabled = false;                    // sombras desligadas

/* ============================================================
   4. CÉU ESTRELADO (3 camadas + via láctea difusa)
   ============================================================ */
function camadaEstrelas(qtd, raioMin, raioMax, tamanho, cor){
  const pos = new Float32Array(qtd * 3);
  const rnd = pseudoAleatorio(qtd);
  for (let i = 0; i < qtd; i++){
    const r = raioMin + rnd()*(raioMax - raioMin);
    const t = rnd()*Math.PI*2, f = Math.acos(2*rnd() - 1);
    pos[i*3]   = r*Math.sin(f)*Math.cos(t);
    pos[i*3+1] = r*Math.cos(f);
    pos[i*3+2] = r*Math.sin(f)*Math.sin(t);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  return new THREE.Points(g, new THREE.PointsMaterial({
    color:cor, size:tamanho, sizeAttenuation:true,
    transparent:true, opacity:.9, depthWrite:false }));
}
cena.add(camadaEstrelas(1400, 500, 600, 1.6, 0xffffff)); // fundo distante

cena.add(camadaEstrelas(350,  220, 300, 3.0, 0xffd9ff)); // primeiro plano

      const rnd = pseudoAleatorio(777);
      const g = ctx.createLinearGradient(0, 0, 0, px);
      g.addColorStop(0, 'rgba(0,0,0,0)');
      g.addColorStop(.5, 'rgba(140,160,220,.35)');
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g; ctx.fillRect(0, 0, px, px);
      for (let i = 0; i < 900; i++){
        const y = px/2 + (rnd()+rnd()+rnd()-1.5)*px*.28;
        ctx.fillStyle = `rgba(220,230,255,${rnd()*.5})`;
        ctx.fillRect(rnd()*px, y, 1, 1);
      }
    }),
    transparent:true, opacity:.55, depthWrite:false,
    side:THREE.DoubleSide, blending:THREE.AdditiveBlending })
);
viaLactea.position.set(0, 60, -560);

   6. PLANETAS, ÓRBITAS, RÓTULOS E LUAS
   ============================================================ */
// Distância comprimida: escala logarítmica para caber na cena
const distanciaCena = ua => 6.5 + 6.2 * Math.log2(1 + ua);

const planetas = [];      // { mesh, dados, angulo, velOrbita, luas:[…] }
const selecionaveis = []; // meshes clicáveis (planetas + luas)

for (const dados of DADOS_PLANETAS){
  const grupo = new THREE.Group();
  cena.add(grupo);

  // Textura por tipo
  let mapa;
  if (dados.nome === 'Terra')        mapa = texturaTerra();
  else if (dados.nome === 'Júpiter') mapa = texturaGasosa(dados.cor, [], true, 11);
  else if (dados.tipo === 'Gasoso')  mapa = texturaGasosa(dados.cor, [], false, dados.nome.length*7);
  else                               mapa = texturaRochosa(dados.cor, dados.nome.length*13);

  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(dados.raio, 24, 18),
    new THREE.MeshStandardMaterial({ map:mapa, roughness:.9, metalness:.05 }));
  mesh.userData = { tipo:'planeta', dados };
  grupo.add(mesh);
  selecionaveis.push(mesh);

  // Anéis de Saturno
  if (dados.nome === 'Saturno'){
    const geoAnel = new THREE.RingGeometry(dados.raio*1.35, dados.raio*2.2, 48);
    const posAttr = geoAnel.attributes.position, v3 = new THREE.Vector3();
    for (let i = 0; i < posAttr.count; i++){ // UV radial p/ faixas concêntricas
      v3.fromBufferAttribute(posAttr, i);
      geoAnel.attributes.uv.setXY(i,
        (v3.length() - dados.raio*1.35) / (dados.raio*0.85), 0.5);
    }
    const anel = new THREE.Mesh(geoAnel, new THREE.MeshBasicMaterial({
      map: novaTextura(128, (ctx, px) => {
        const rnd = pseudoAleatorio(55);
        for (let x = 0; x < px; x++){
          const a = .25 + rnd()*.6;
          ctx.fillStyle = `rgba(216,192,138,${a * (x>px*.45&&x<px*.55 ? .15 : 1)})`;
          ctx.fillRect(x, 0, 1, px);
        }
      }),
      side:THREE.DoubleSide, transparent:true, opacity:.85 }));
    anel.rotation.x = Math.PI/2 - 0.35;
    mesh.add(anel);
  }

  // Rótulo com nome
  const rotulo = spriteRotulo(dados.nome);
  rotulo.position.y = dados.raio + 1.0;
  grupo.add(rotulo);

  // Órbita circular de baixa opacidade
  const distancia = distanciaCena(dados.ua);
  const pontos = [];
  for (let a = 0; a <= 64; a++){
    const t = a/64 * Math.PI*2;
    pontos.push(new THREE.Vector3(Math.cos(t)*distancia, 0, Math.sin(t)*distancia));
  }
  cena.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(pontos),
    new THREE.LineBasicMaterial({ color:0x00f7ff, transparent:true, opacity:.14 })));

  // Luas do planeta (translação em tempo real)
  const luas = [];
  for (const dl of (DADOS_LUAS[dados.nome] || [])){
    const meshLua = new THREE.Mesh(
      new THREE.SphereGeometry(dl.tam, 14, 10),
      new THREE.MeshStandardMaterial({
        map: texturaRochosa(dl.cor, dl.nome.length*31), roughness:1 }));
    meshLua.userData = { tipo:'lua', dados:dl, planetaMae:dados.nome };
    grupo.add(meshLua);
    selecionaveis.push(meshLua);
    luas.push({
      mesh: meshLua,
      dist: dados.raio + dl.dist,                 // distância a partir da superfície
      angulo: Math.random()*Math.PI*2,
      vel: 1.1 / Math.pow(dados.raio + dl.dist, 1.5), // Kepler: mais perto = mais rápido
      inclinacao: (Math.random()-.5)*.3
    });
  }

  planetas.push({
    grupo, mesh, dados, luas, distancia,
    angulo: Math.random()*Math.PI*2,
    velOrbita: 0.22 / Math.pow(dados.ua, 0.9),   // velocidade visual proporcional
  });
}

const estado = {
  velocidade: 1, direcao: 1, pausado: false,
  anguloCamera: 0, raioCamera: 46, alturaCamera: 14,
  yawArraste: 0, pitchArraste: 0,       // toque/arrasto

};
const LIMITE_ANGULO = THREE.MathUtils.degToRad(35); // ±35° (Sol sempre visível)
const clampe = v => THREE.MathUtils.clamp(v, -LIMITE_ANGULO, LIMITE_ANGULO);

/* ============================================================
   8. ÁUDIO SINTETIZADO (Web Audio API)
   ============================================================ */
let ctxAudio = null;
function garantirAudio(){
  if (!ctxAudio){
    try{ ctxAudio = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e){ /* sem suporte a áudio */ }
  }
  if (ctxAudio && ctxAudio.state === 'suspended') ctxAudio.resume();
}
function somDisparo(){
  if (!ctxAudio) return;
  const osc = ctxAudio.createOscillator();
  const ganho = ctxAudio.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(880, ctxAudio.currentTime);
  osc.frequency.exponentialRampToValueAtTime(180, ctxAudio.currentTime + .12);
  ganho.gain.setValueAtTime(.15, ctxAudio.currentTime);
  ganho.gain.exponentialRampToValueAtTime(.001, ctxAudio.currentTime + .14);
  osc.connect(ganho); ganho.connect(ctxAudio.destination);
  osc.start(); osc.stop(ctxAudio.currentTime + .15);
}
function somSelecao(){
  if (!ctxAudio) return;
  const osc = ctxAudio.createOscillator();
  const ganho = ctxAudio.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(520, ctxAudio.currentTime);
  osc.frequency.linearRampToValueAtTime(1040, ctxAudio.currentTime + .1);
  ganho.gain.setValueAtTime(.1, ctxAudio.currentTime);
  ganho.gain.exponentialRampToValueAtTime(.001, ctxAudio.currentTime + .18);
  osc.connect(ganho); ganho.connect(ctxAudio.destination);
  osc.start(); osc.stop(ctxAudio.currentTime + .2);
}

/* ============================================================
   11. TOQUE / ARRASTO / CLIQUE (fallback sem giroscópio)
   ============================================================ */
let ptrAtivo = false, ptrX = 0, ptrY = 0, ptrMoveu = false;
renderer.domElement.addEventListener('pointerdown', e => {
  garantirAudio();
  ptrAtivo = true; ptrMoveu = false;
  ptrX = e.clientX; ptrY = e.clientY;
});
renderer.domElement.addEventListener('pointermove', e => {
  if (!ptrAtivo) return;
  const dx = e.clientX - ptrX, dy = e.clientY - ptrY;
  if (Math.abs(dx) + Math.abs(dy) > 6) ptrMoveu = true;
  estado.yawArraste  = clampe(estado.yawArraste  - dx * 0.0032);
  estado.pitchArraste = clampe(estado.pitchArraste - dy * 0.0032);
  ptrX = e.clientX; ptrY = e.clientY;
});
addEventListener('pointerup', e => {
  if (!ptrAtivo) return;
  ptrAtivo = false;
  if (ptrMoveu) return; // foi arrasto, não toque
  // Toque simples: tenta selecionar objeto sob o dedo/cursor
  const nd = new THREE.Vector2(
    (e.clientX / innerWidth) * 2 - 1,
    -(e.clientY / innerHeight) * 2 + 1);
  raycaster.setFromCamera(nd, camera);
  const hits = raycaster.intersectObjects(selecionaveis);
  if (hits.length){ selecionar(hits[0].object); }
  else if (estado.selecionado){ limparSelecao(); } // área vazia fecha seleção
  else { disparar(); } // clique livre = disparo
});

/* ============================================================
   12. GIROSCÓPIO (deviceorientation)
   ============================================================ */
function aoGirar(e){
  if (e.alpha == null) return;
  estado.giroAtivo = true;
  if (estado.refAlpha === null){
    estado.refAlpha = e.alpha; estado.refGamma = e.gamma; estado.refBeta = e.beta;
  }
  // Yaw: rotação da bússola relativa à referência
  let dA = e.alpha - estado.refAlpha;
  if (dA > 180) dA -= 360; if (dA < -180) dA += 360;
  estado.yawGiro = clampe(THREE.MathUtils.degToRad(dA));
  // Pitch: depende da orientação da tela (paisagem usa gamma)
  const ang = (screen.orientation && screen.orientation.angle) || window.orientation || 0;
  let dP;
  if (Math.abs(ang) === 90) dP = (e.gamma - estado.refGamma) * (ang === 90 ? 1 : -1);
  else                      dP = (e.beta - estado.refBeta);
  estado.pitchGiro = clampe(THREE.MathUtils.degToRad(dP || 0));
}
async function ativarGiroscopio(){
  try{
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function'){
      const r = await DeviceOrientationEvent.requestPermission(); // iOS
      if (r !== 'granted'){ avisar('Giroscópio negado — use toque/arrasto para olhar.'); return; }
    }
    addEventListener('deviceorientation', aoGirar);
  }catch(e){
    avisar('Giroscópio indisponível neste aparelho — use toque/arrasto.');
  }
}

/* ============================================================
   13. TECLADO (alternativo ao controle)
   ============================================================ */
addEventListener('keydown', e => {
  garantirAudio();
  switch (e.code){
    case 'Space': case 'Enter':
      estado.pausado = !estado.pausado; break;
    case 'ArrowUp': case 'ArrowRight':
      estado.velocidade = Math.min(5, estado.velocidade + .1); break;
    case 'ArrowDown': case 'ArrowLeft':
      estado.velocidade = Math.max(.1, estado.velocidade - .1); break;
    case 'Backspace': case 'Escape':
      if (estado.selecionado){ limparSelecao(); }
      else estado.direcao *= -1;
      break;
    case 'KeyR': reiniciarCamera(); break;
  }
  atualizarHUD();
});

function reiniciarCamera(){
  estado.yawArraste = 0; estado.pitchArraste = 0;
  estado.yawGiro = 0; estado.pitchGiro = 0;
  estado.refAlpha = null; // recentraliza giroscópio
  estado.velocidade = 1; estado.direcao = 1; estado.pausado = false;
  limparSelecao();
  atualizarHUD();
}

/* ============================================================
   14. GAMEPAD — SHINECON SC-BC03 (mapeamento completo)
   ------------------------------------------------------------
   A(0)/B(1)  pausar · X(2)/Y(3) inverter · L(4)/R(5) IPD
   Gatilho(6/7) disparo · Start(9) reiniciar
   D-pad cima/esq: acelerar · baixo/dir: desacelerar
   ============================================================ */
let botoesAnteriores = [];
let gamepadConectado = null;

addEventListener('gamepadconnected', e => {
  gamepadConectado = e.gamepad.id;
  avisar('🎮 Controle detectado: ' + e.gamepad.id.slice(0, 30));
  atualizarHUD();
});
addEventListener('gamepaddisconnected', () => {
  gamepadConectado = null;
  atualizarHUD();
});

function lerGamepad(){
  const gps = navigator.getGamepads ? navigator.getGamepads() : [];
  let gp = null;
  for (const g of gps){ if (g && g.connected){ gp = g; break; } }
  if (!gp) return;
  if (!gamepadConectado){ gamepadConectado = gp.id; atualizarHUD(); }

  const apertou = i =>
    gp.buttons[i] && gp.buttons[i].pressed && !botoesAnteriores[i];

  if (apertou(0) || apertou(1)) estado.pausado = !estado.pausado;      // A/B
  if (apertou(2) || apertou(3)) estado.direcao *= -1;                  // X/Y
  if (apertou(4)) ajustarIPD(estado.ipdMm - 1);                        // L
  if (apertou(5)) ajustarIPD(estado.ipdMm + 1);                        // R
  if (apertou(6) || apertou(7)) disparar();                            // gatilho
  if (apertou(9)) reiniciarCamera();                                   // Start
  if (apertou(12) || apertou(14))                                      // ↑ / ←
    estado.velocidade = Math.min(5, estado.velocidade + .1);
  if (apertou(13) || apertou(15))                                      // ↓ / →
    estado.velocidade = Math.max(.1, estado.velocidade - .1);

  // Eixo analógico vertical controla velocidade continuamente
  if (gp.axes.length > 1 && Math.abs(gp.axes[1]) > 0.25){
    estado.velocidade = THREE.MathUtils.clamp(
      estado.velocidade - gp.axes[1] * 0.02, .1, 5);
  }
  botoesAnteriores = gp.buttons.map(b => b.pressed);
  atualizarHUD();
}

/* ============================================================
   15. MODO VR (estéreo side-by-side p/ Shinecon SC-G04E)
   ============================================================ */
const btnVR = document.getElementById('btnVR');
const btnSairVR = document.getElementById('btnSairVR');

async function entrarVR(){
  garantirAudio();
  estado.vr = true;
  document.body.classList.add('vr');
  reticulo3D.visible = true;
  estado.refAlpha = null; // recentraliza olhar
  await ativarGiroscopio();
  try{ await document.documentElement.requestFullscreen(); }
  catch(e){ /* fullscreen pode ser bloqueado — segue sem */ }
  try{ await screen.orientation.lock('landscape'); }
  catch(e){ /* trava de orientação nem sempre disponível */ }
  verificarOrientacao();
}
function sairVR(){
  estado.vr = false;
  document.body.classList.remove('vr', 'retrato');
  reticulo3D.visible = false;
  try{ screen.orientation.unlock(); }catch(e){}
  if (document.fullscreenElement) document.exitFullscreen().catch(()=>{});
  aoRedimensionar();
}
btnVR.addEventListener('click', entrarVR);
btnSairVR.addEventListener('click', sairVR);

function verificarOrientacao(){
  const retrato = innerHeight > innerWidth;
  document.body.classList.toggle('retrato', retrato && estado.vr);
}

// Planeta mais próximo da câmera (atualizado a cada 600 ms)
setInterval(() => {
  let melhor = null, dMin = Infinity;
  const pv = new THREE.Vector3();
  for (const p of planetas){
    p.mesh.getWorldPosition(pv);
    const d = pv.distanceTo(camera.position);
    if (d < dMin){ dMin = d; melhor = p; }

    document.getElementById('chipProximo').textContent =
      `📍 ${melhor.dados.nome} · ${melhor.dados.curiosidade}`;

/* ============================================================
   17. LOOP DE ANIMAÇÃO (deltaTime fixo ~60 fps)
   ============================================================ */
const relogio = new THREE.Clock();
const _vTmp = new THREE.Vector3();
const _vDir = new THREE.Vector3();

function animar(){
  requestAnimationFrame(animar);
  const dt = Math.min(relogio.getDelta(), 1/30); // passo limitado (estabilidade)
  const passo = dt * 60 / 60; // normalizado p/ 60 fps

  lerGamepad();

  // --- Sol: pulsação da corona ---
  const pulso = 1 + Math.sin(performance.now() * 0.0016) * 0.06;
  corona.scale.set(11 * pulso, 11 * pulso, 1);
  sol.rotation.y += 0.0009;

  // --- Planetas: órbita + rotação própria; luas em tempo real ---
  for (const p of planetas){
    if (!estado.pausado){
      p.angulo += p.velOrbita * estado.velocidade * estado.direcao * dt;
    }
    p.grupo.position.set(
      Math.cos(p.angulo) * p.distancia, 0, Math.sin(p.angulo) * p.distancia);
    p.mesh.rotation.y += p.dados.velRot * estado.velocidade;

    for (const l of p.luas){
      l.angulo += l.vel * dt * 2.2; // luas nunca pausam (tempo real)
      l.mesh.position.set(
        Math.cos(l.angulo) * l.dist,
        Math.sin(l.angulo) * l.dist * l.inclinacao,
        Math.sin(l.angulo) * l.dist);
      l.mesh.rotation.y += 0.01;
    }
  }

  // --- Câmera orbital ---
  let posDesejada, alvoDesejado;
  if (estado.selecionado){
    // Órbita lenta ao redor do objeto selecionado (3 s em destaque)
    estado.tempoSelecao += dt;
    estado.selecionado.getWorldPosition(_vTmp);
    const r = estado.selecionado.geometry.parameters.radius;
    const a = estado.tempoSelecao * (estado.tempoSelecao < 3 ? 0.6 : 0.15);
    posDesejada = _vTmp.clone().add(new THREE.Vector3(
      Math.cos(a) * r * 5, r * 2, Math.sin(a) * r * 5));
    alvoDesejado = _vTmp.clone();
    destaque.position.copy(_vTmp);
  } else {
    if (!estado.pausado){
      estado.anguloCamera += 0.05 * estado.velocidade * estado.direcao * dt;
    }
    posDesejada = new THREE.Vector3(
      Math.cos(estado.anguloCamera) * estado.raioCamera,
      estado.alturaCamera,
      Math.sin(estado.anguloCamera) * estado.raioCamera);
    alvoDesejado = new THREE.Vector3(0, 0, 0); // sempre olhando o Sol
  }
  // Transições suaves entre pontos de observação
  estado.posCamera.lerp(posDesejada, 1 - Math.pow(0.02, dt));
  estado.alvoOlhar.lerp(alvoDesejado, 1 - Math.pow(0.02, dt));
  camera.position.copy(estado.posCamera);
  camera.lookAt(estado.alvoOlhar);

  // Offsets de olhar (giro + arrasto), limitados a ±35°
  camera.rotateY(clampe(estado.yawArraste + estado.yawGiro));
  camera.rotateX(clampe(estado.pitchArraste + estado.pitchGiro));
  camera.updateMatrixWorld();

  // --- Renderização (normal ou estéreo) ---
  if (estado.vr) renderizarEstereo();
  else renderer.render(cena, camera);
}

/* ---------- Renderização estéreo side-by-side ---------- */
function renderizarEstereo(){
  const w = renderer.domElement.width / renderer.getPixelRatio();
  const h = renderer.domElement.height / renderer.getPixelRatio();
  // Separação em unidades de mundo derivada do IPD em mm
  const sep = (estado.ipdMm / 64) * 0.32;
  _vDir.setFromMatrixColumn(camera.matrixWorld, 0); // eixo X local (direita)

  for (const [cam, lado] of [[camL, -1], [camR, 1]]){
    cam.copy(camera);
    cam.position.addScaledVector(_vDir, lado * sep / 2);
    cam.aspect = (w / 2) / h;
    cam.updateProjectionMatrix();
    cam.updateMatrixWorld();
  }
  renderer.setScissorTest(true);
  renderer.setViewport(0, 0, w/2, h); renderer.setScissor(0, 0, w/2, h);
  renderer.render(cena, camL);
  renderer.setViewport(w/2, 0, w/2, h); renderer.setScissor(w/2, 0, w/2, h);
  renderer.render(cena, camR);
  renderer.setScissorTest(false);
}

/* ============================================================
   18. REDIMENSIONAMENTO E INICIALIZAÇÃO
   ============================================================ */
function aoRedimensionar(){
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  verificarOrientacao();
}
addEventListener('resize', aoRedimensionar);
addEventListener('orientationchange', () => setTimeout(aoRedimensionar, 300));

// Giroscópio já disponível fora do VR (Android não exige permissão)
if (typeof DeviceOrientationEvent !== 'undefined' &&
    typeof DeviceOrientationEvent.requestPermission !== 'function'){
  addEventListener('deviceorientation', aoGirar);
}

// Avisos de contexto
if (location.protocol === 'file:'){
  avisar('⚠ Sirva via HTTPS — giroscópio e VR não funcionam em file://');
}

// Service worker (PWA / offline)
if ('serviceWorker' in navigator){
  addEventListener('load', () =>
    navigator.serviceWorker.register('./service-worker.js').catch(() => {}));
}

atualizarHUD();
animar();
</script>
